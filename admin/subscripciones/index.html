<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Suscripciones - TraficoMap Admin</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>
  <div id="app" class="d-flex">
    <!-- Sidebar -->
    <nav class="sidebar bg-light">
      <div class="sidebar-header">
        <h5>TraficoMap</h5>
        <small>Admin Panel</small>
      </div>

      <ul class="nav flex-column">
        <li class="nav-item">
          <a href="../index.html" class="nav-link">
            <i class="bi bi-speedometer2"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a href="../clientes/index.html" class="nav-link">
            <i class="bi bi-people"></i> Clientes
          </a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link active" style="background-color: rgba(102, 126, 234, 0.2); border-left: 4px solid #667eea;">
            <i class="bi bi-credit-card"></i> Suscripciones
          </a>
        </li>
        <li class="nav-item">
          <a href="../billing/index.html" class="nav-link">
            <i class="bi bi-file-earmark-pdf"></i> Billing
          </a>
        </li>
      </ul>

      <hr />

      <div class="sidebar-footer">
        <button id="logoutBtn" class="btn btn-sm btn-outline-danger w-100">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content flex-grow-1">
      <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container-fluid">
          <span class="navbar-brand">
            <i class="bi bi-credit-card"></i> Gestión de Suscripciones
          </span>
          <div class="ms-auto">
            <button id="navbarLogout" class="btn btn-sm btn-outline-danger">
              Logout
            </button>
          </div>
        </div>
      </nav>

      <div class="container-fluid p-4">
        <div id="alertas"></div>

        <div class="row mb-4">
          <div class="col">
            <h3>Suscripciones Activas</h3>
            <p class="text-muted">Gestiona planes y renovaciones de clientes</p>
          </div>
        </div>

        <div class="card mb-4">
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label for="searchSubscripciones" class="form-label">Buscar</label>
                <input 
                  type="text" 
                  class="form-control" 
                  id="searchSubscripciones" 
                  placeholder="Cliente, plan o email..."
                />
              </div>
              <div class="col-md-3">
                <label for="filterEstado" class="form-label">Estado</label>
                <select class="form-select" id="filterEstado">
                  <option value="todos">Todos</option>
                  <option value="activa">Activas</option>
                  <option value="proxima_vencer">Próximas a Vencer</option>
                </select>
              </div>
              <div class="col-md-3">
                <label for="filterPlan" class="form-label">Plan</label>
                <select class="form-select" id="filterPlan">
                  <option value="todos">Todos los planes</option>
                  <option value="basico">Básico</option>
                  <option value="profesional">Profesional</option>
                  <option value="enterprise">Enterprise</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header bg-light">
            <h5 class="mb-0"><i class="bi bi-list-check"></i> Listado de Suscripciones</h5>
          </div>
          <div class="card-body">
            <div id="subscripcionesTable">
              <div class="spinner-border" role="status">
                <span class="visually-hidden">Cargando...</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-analytics.js"></script>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/subscripciones-manager.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        await new Promise((resolve) => {
          const unsubscribe = auth.onAuthStateChanged(async (user) => {
            unsubscribe();
            if (!user || !user.customClaims?.role === 'admin') {
              window.location.href = '../index.html';
              return;
            }
            await subscripcionesManager.init();
            resolve();
          });
        });
      } catch (error) {
        console.error('Error:', error);
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await auth.signOut();
      window.location.href = '../index.html';
    });

    document.getElementById('navbarLogout').addEventListener('click', async () => {
      await auth.signOut();
      window.location.href = '../index.html';
    });
  </script>
</body>
</html>
