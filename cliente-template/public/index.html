<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>TraficoMap - Sistema de Monitoreo Municipal</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  
  <!-- Leaflet MarkerCluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    
    #app-container {
      display: flex;
      height: 100vh;
      width: 100%;
    }
    
    #sidebar {
      width: 300px;
      background: #1a1a2e;
      color: white;
      padding: 20px;
      overflow-y: auto;
      overflow-x: visible;
      box-shadow: 2px 0 8px rgba(0,0,0,0.1);
      position: relative;
      z-index: 10;
    }
    
    #map {
      flex: 1;
      background: #e0e0e0;
    }
    
    #logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .sidebar-section {
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 15px;
      position: relative;
      z-index: 10;
    }
    
    .sidebar-section:last-child {
      border-bottom: none;
    }
    
    .sidebar-title {
      font-size: 14px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 10px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    button {
      padding: 10px 15px;
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }
    
    button:hover {
      background: #0052cc;
    }
    
    button.secondary {
      background: #555;
    }
    
    button.secondary:hover {
      background: #666;
    }
    
    input[type="text"], select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #999;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 8px;
      background: white;
      color: #333;
      position: relative;
      z-index: 100;
    }
    
    select {
      appearance: auto;
      cursor: pointer;
    }
    
    select:focus {
      outline: 2px solid #0066ff;
      outline-offset: 0;
    }
    
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* CLIENTE: Indicador de suscripción */
    #suscripcion-badge {
      background: #4CAF50;
      color: white;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      margin-top: 10px;
      text-align: center;
    }

    #suscripcion-badge.expiring {
      background: #ff9800;
    }

    #suscripcion-badge.expired {
      background: #f44336;
    }
    
    @media (max-width: 768px) {
      #app-container {
        flex-direction: column;
      }
      
      #sidebar {
        width: 100%;
        max-height: 30vh;
      }
      
      #map {
        min-height: 70vh;
      }
    }
  </style>
</head>
<body>

<div id="app-container">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="logo">
      🗺️ TraficoMap
    </div>
    
    <!-- CLIENTE: Mostrar ciudad y estado de suscripción -->
    <div class="sidebar-section" id="ciudad-info-section" style="display: none;">
      <div class="sidebar-title">🏙️ Tu Municipio</div>
      <div id="city-display" style="font-size: 16px; font-weight: bold; padding: 10px; background-color: #e8f4ff; border-radius: 4px; color: #1a1a2e;">
        <span id="city-name">Cargando...</span>
      </div>
      <div id="suscripcion-badge">
        Suscripción activa
      </div>
    </div>
    
    <!-- El contenido se carga dinámicamente desde app.js -->
    <div style="font-size: 12px; color: #aaa; padding: 20px; text-align: center;">
      <span class="loading-spinner"></span> Iniciando sesión y verificando acceso...
    </div>
  </div>
  
  <!-- Map -->
  <div id="map"></div>
</div>

<!-- CLIENTE: Cargar config PRIMERO -->
<script src="config.json" type="application/json"></script>
<script>
  // Cargar config desde archivo o window
  fetch('config.json')
    .then(r => r.json())
    .then(data => {
      window.CONFIG = data;
      console.log('✅ Config cargada:', window.CONFIG);
    })
    .catch(e => console.warn('⚠️ Config no encontrada (esperado en desarrollo):', e));
</script>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Leaflet MarkerCluster JS -->
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<!-- Leaflet Heat JS -->
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

<!-- Firebase JS (v8 Compat) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<!-- CLIENTE: Firebase Config desde window.CONFIG -->
<script>
// Usar config del cliente, no hardcodeado
const firebaseConfig = window.CONFIG?.firebase_cliente || {
  projectId: "FALTA_CONFIG"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.firestore();

// Require authentication to access main map
auth.onAuthStateChanged((user) => {
  if (!user) {
    console.warn('⚠️ No authenticated user. Redirecting to login...');
    window.location.href = '/login.html';
  }
});
</script>

<!-- CLIENTE: Verificación de suscripción ANTES de cargar app.js -->
<script src="js/verificar-suscripcion.js"></script>

<!-- Maps API (with Street View support) -->
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBp2ZiKA4lYieyjX_aJJjE023NeqKrRhJc&libraries=places"></script>

<!-- App Scripts -->
<script src="js/format-help.js?v=20260420001"></script>
<script src="js/geo-layers.js"></script>
<script src="js/siniestros-layer.js"></script>
<script src="js/cameras-layer.js"></script>
<script src="js/private-cameras-layer.js"></script>
<script src="js/semaforos-layer.js"></script>
<script src="js/colegios-layer.js"></script>
<script src="js/corredores-layer.js"></script>
<script src="js/heatmap-layer.js"></script>
<script src="js/aforos-layer.js?v=20260420001"></script>
<script src="js/colectivos-layer.js"></script>
<script src="js/colectivos-ui.js"></script>
<script src="js/street-view-layer.js?v=20260420001"></script>
<script src="js/geo-locator.js"></script>
<script src="js/lpr-layer-v2.js"></script>
<script src="js/robo-layer.js?v=20260420001"></script>
<script src="js/patrulla-layer.js?v=20260420001"></script>
<script src="js/patrulla-chat.js?v=20260420001"></script>
<script src="js/app.js?v=20260420001"></script>

</body>
</html>
