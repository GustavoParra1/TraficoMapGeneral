<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Force Refresh - Admin</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 500px;
    }
    
    h1 {
      color: #333;
      margin: 0 0 20px 0;
    }
    
    p {
      color: #666;
      margin: 10px 0;
      font-size: 14px;
    }
    
    .status {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 5px;
      margin: 20px 0;
      font-family: monospace;
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .status-item {
      margin: 5px 0;
      padding: 5px;
    }
    
    .success { color: #28a745; }
    .warning { color: #ffc107; }
    .error { color: #dc3545; }
    
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px 5px;
    }
    
    button:hover {
      background: #764ba2;
    }
    
    button.secondary {
      background: #6c757d;
    }
    
    button.secondary:hover {
      background: #5a6268;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔄 Force Refresh Admin</h1>
    <p>Esta página borra el caché y recarga el panel admin</p>
    
    <div class="status" id="status"></div>
    
    <button onclick="performCleanup()">🧹 Limpiar Caché y Recargar</button>
    <button class="secondary" onclick="goToAdmin()">✅ Ir al Admin (sin limpiar)</button>
  </div>

  <script>
    const statusDiv = document.getElementById('status');
    
    function addStatus(message, type = 'info') {
      const item = document.createElement('div');
      item.className = `status-item ${type}`;
      item.textContent = message;
      statusDiv.appendChild(item);
      statusDiv.scrollTop = statusDiv.scrollHeight;
      console.log(`[${type}] ${message}`);
    }
    
    async function performCleanup() {
      try {
        addStatus('Limpiando localStorage...', 'warning');
        localStorage.clear();
        
        addStatus('Limpiando sessionStorage...', 'warning');
        sessionStorage.clear();
        
        addStatus('Limpiando caché (Service Workers)...', 'warning');
        if ('caches' in window) {
          const cacheNames = await caches.keys();
          await Promise.all(
            cacheNames.map(cache => caches.delete(cache))
          );
          addStatus(`Caches borrados: ${cacheNames.length}`, 'success');
        }
        
        addStatus('Borrando cookies...', 'warning');
        document.cookie.split(";").forEach((c) => {
          document.cookie = c
            .replace(/^ +/, "")
            .replace(/=.*/, `=;expires=${new Date().toUTCString()};path=/`);
        });
        
        addStatus('✅ Limpieza completada', 'success');
        addStatus('Redirigiendo al admin en 2 segundos...', 'warning');
        
        setTimeout(() => {
          // Usar location.replace para no guardar en historial
          window.location.replace('/admin/');
        }, 2000);
        
      } catch (error) {
        addStatus(`❌ Error: ${error.message}`, 'error');
      }
    }
    
    function goToAdmin() {
      window.location.href = '/admin/';
    }
    
    // Al cargar, mostrar estado
    window.addEventListener('load', () => {
      addStatus(`📍 URL: ${window.location.href}`, 'info');
      addStatus(`🌐 Firebase Config: ${localStorage.getItem('firebase-config') ? 'Configurado' : 'No encontrado'}`, 'info');
      addStatus('✅ Página lista', 'success');
    });
  </script>
</body>
</html>
