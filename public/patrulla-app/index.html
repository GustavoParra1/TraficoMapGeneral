<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📱 Patrulla - TraficoMap</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <style>
    * { box-sizing: border-box; }
    
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .app-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      flex: 0 0 auto;
    }

    .app-header h1 {
      margin: 0;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-header .status {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
    }

    .btn-logout {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s ease;
      font-weight: 500;
    }

    .btn-logout:hover {
      background: rgba(255, 255, 255, 0.3);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.8);
    }

    .status-dot.emergencia {
      background: #ef4444;
      animation: pulse 0.6s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* MAIN CONTAINER */
    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    /* MAP SECTION */
    .map-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0f172a;
    }

    #map {
      flex: 1;
      background: #0f172a;
    }

    .map-info {
      background: #1e293b;
      padding: 12px 16px;
      border-top: 1px solid #334155;
      font-size: 12px;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .map-info .coords {
      display: flex;
      gap: 12px;
    }

    .map-info .speed {
      font-weight: bold;
      color: #60a5fa;
    }

    /* CHAT SECTION */
    .chat-section {
      width: 340px;
      background: #1e293b;
      border-left: 1px solid #334155;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 12px 16px;
      background: #0f172a;
      border-bottom: 1px solid #334155;
      flex: 0 0 auto;
    }

    .chat-header h3 {
      margin: 0;
      font-size: 14px;
      color: #e2e8f0;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.incoming {
      align-items: flex-start;
    }

    .message.outgoing {
      align-items: flex-end;
    }

    .message.broadcast {
      align-items: center;
      text-align: center;
    }

    .message-content {
      padding: 10px 12px;
      border-radius: 8px;
      max-width: 90%;
      word-wrap: break-word;
      font-size: 13px;
      line-height: 1.4;
    }

    .message.incoming .message-content {
      background: #334155;
      color: #e2e8f0;
    }

    .message.outgoing .message-content {
      background: #667eea;
      color: white;
    }

    .message.broadcast .message-content {
      background: #10b981;
      color: white;
      font-size: 12px;
      width: 90%;
      border-radius: 4px;
    }

    .message-meta {
      font-size: 11px;
      color: #64748b;
      padding: 0 8px;
    }

    .empty-messages {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #64748b;
      text-align: center;
      font-size: 12px;
    }

    /* INPUT AREA */
    .message-input-area {
      padding: 12px;
      border-top: 1px solid #334155;
      background: #0f172a;
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .message-input-area input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #334155;
      border-radius: 20px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
    }

    .message-input-area input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .message-input-area input::placeholder {
      color: #64748b;
    }

    .message-input-area button {
      padding: 10px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      transition: all 0.2s;
    }

    .message-input-area button:hover {
      background: #5568d3;
    }

    .message-input-area button:active {
      transform: scale(0.95);
    }

    /* CONTROL BAR */
    .control-bar {
      background: #1e293b;
      border-top: 1px solid #334155;
      padding: 12px;
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #0f172a;
      color: #e2e8f0;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      transition: all 0.2s;
    }

    .btn:hover {
      background: #1e293b;
      border-color: #475569;
    }

    .btn.emergencia {
      background: #ef4444;
      color: white;
      border-color: #dc2626;
    }

    .btn.emergencia:hover {
      background: #dc2626;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #0f172a;
    }

    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }

    /* PATROL MARKER */
    .patrol-marker,
    .my-patrol-marker {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }

    .patrol-marker img,
    .my-patrol-marker img {
      display: none !important;
    }

    /* MODAL FOR PATRULLA SELECT */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #1e293b;
      padding: 24px;
      border-radius: 12px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-content h2 {
      margin: 0 0 16px 0;
      color: #e2e8f0;
      font-size: 18px;
    }

    .modal-content p {
      color: #94a3b8;
      margin: 0 0 16px 0;
      font-size: 14px;
    }

    .modal-content select {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 14px;
    }

    .modal-content button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }

    .modal-content button:hover {
      background: #5568d3;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="app-header">
  <h1>
    <span id="patrulla-id">📱 Patrulla</span>
  </h1>
  <div class="status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Conectando...</span>
    <button class="btn-logout" onclick="logout()" title="Cerrar sesión">Salir</button>
  </div>
</div>

<!-- MAIN CONTAINER -->
<div class="container">
  <!-- MAP -->
  <div class="map-section">
    <div id="map"></div>
    <div class="map-info">
      <div class="coords">
        <div>📍 <span id="lat">-38.00</span>, <span id="lng">-57.55</span></div>
        <div class="speed">⚡ <span id="speed">0</span> km/h</div>
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="btn" id="btn-start-tracking" style="width: auto; background: #10b981;">📍 Iniciar Rastreo</button>
        <button class="btn emergencia" id="btn-emergencia" style="width: auto;">🚨 EMERGENCIA</button>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-section">
    <div class="chat-header">
      <h3>💬 Mensajes</h3>
    </div>
    <div class="messages-container" id="messages-container">
      <div class="empty-messages">Esperando mensajes...</div>
    </div>
    <div class="message-input-area">
      <input type="text" id="message-input" placeholder="Responder...">
      <button id="btn-send">Enviar</button>
    </div>
  </div>
</div>

<!-- CONTROL BAR -->
<div class="control-bar">
  <button class="btn" id="btn-select-patrulla">🔄 Cambiar Patrulla</button>
  <button class="btn" id="btn-clear-messages">🗑️ Limpiar Chat</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Selecciona tu Patrulla</h2>
    <p>¿Cuál eres?</p>
    <select id="patrulla-options">
      <option value="">-- Cargando patrullas --</option>
    </select>
    <button type="button" id="btn-continue">Continuar</button>
  </div>
</div>

  <script>
  // ========================================
  // FIREBASE CONFIG - Cargar desde config.json
  // ========================================
  let firebaseConfig = null;
  let db = null;
  let auth = null;

  async function initializeFirebase() {
    try {
      // Cargar configuración desde config.json
      const response = await fetch('../config.json');
      const config = await response.json();
      firebaseConfig = config.firebase;

      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }

      db = firebase.firestore();
      auth = firebase.auth();

      console.log('✅ Firebase initialized for patrulla-app');

      // Verificar autenticación
      auth.onAuthStateChanged(async (user) => {
        if (!user) {
          console.warn('⚠️ No authenticated user. Redirecting to login...');
          window.location.href = '/login.html';
        } else {
          console.log('✅ Authenticated user:', user.email);
          
          // Obtener el custom claim 'city' del usuario
          const idTokenResult = await user.getIdTokenResult();
          const userCity = idTokenResult.claims.city;
          
          if (userCity) {
            municipio = userCity;
            console.log(`📍 Ciudad del usuario: ${municipio}`);
          } else {
            console.warn('⚠️ No se encontró city en custom claims');
          }
          
          // Iniciar la aplicación
          loadPatrollaFromStorage();
        }
      });
    } catch (error) {
      console.error('❌ Firebase initialization error:', error);
      alert('Error al inicializar Firebase. Por favor recarga la página.');
    }
  }

  // Inicializar Firebase al cargar
  initializeFirebase();

  // ========================================
  // VARIABLES GLOBALES
  // ========================================
  let map = null;
  let patrullaId = null;  // Inicializar como null siempre
  let municipio = null;  // Se establece después de autenticación
  let myMarker = null;
  let emergencia = false;
  let ubicacionInterval = null;
  let isInitialized = false;  // Flag para evitar múltiples inicializaciones

  // Coordenadas de cada ciudad
  const CITY_COORDS = {
    'mardelplata': [-38.0, -57.55],
    'cordoba': [-31.4201, -64.1888],
    'san-martin-del-mar': [-38.05, -57.6]
  };

  // ========================================
  // CARGAR PATRULLA GUARDADA
  // ========================================
  function loadPatrollaFromStorage() {
    const stored = localStorage.getItem('patrullaId');
    if (stored) {
      patrullaId = stored;
      console.log(`✅ Patrulla cargada del localStorage: ${patrullaId}`);
      return true;
    }
    return false;
  }

  // ========================================
  // MODAL - SELECCIONAR PATRULLA
  // ========================================
  async function showSelectPatrullaModal() {
    console.log('📋 Mostrando modal de selección de patrulla');
    const modal = document.getElementById('modal');
    const select = document.getElementById('patrulla-options');
    
    modal.classList.add('active');
    document.getElementById('patrulla-id').textContent = '📱 Seleccionar patrulla...';

    // Limpiar opciones previas
    select.innerHTML = '<option value="">-- Cargando patrullas --</option>';

    try {
      // Cargar patrullas UNA SOLA VEZ (no continuo)
      const coleccion = `patrullas_${municipio}`;
      const snapshot = await db.collection(coleccion).get();

      console.log(`📡 Patrullas cargadas: ${snapshot.size}`);

      if (snapshot.empty) {
        select.innerHTML = '<option value="">❌ No hay patrullas disponibles</option>';
        console.warn('⚠️ No hay patrullas en Firestore');
        return;
      }

      select.innerHTML = '<option value="">-- Selecciona tu patrulla --</option>';

      snapshot.forEach((doc) => {
        const option = document.createElement('option');
        option.value = doc.id;
        option.textContent = `🚓 ${doc.id}`;
        select.appendChild(option);
      });

      console.log('✅ Patrullas cargadas en el select');
    } catch (error) {
      console.error('❌ Error cargando patrullas:', error);
      select.innerHTML = '<option value="">❌ Error cargando patrullas</option>';
      alert('Error cargando patrullas: ' + error.message);
    }
  }

  // ========================================
  // INICIALIZAR MAPA
  // ========================================
  function initMap() {
    if (map) {
      console.log('⚠️ Mapa ya inicializado, saltando...');
      return;
    }
    
    // Obtener coordenadas basadas en la ciudad
    const coords = CITY_COORDS[municipio] || [-38.0, -57.55];
    console.log(`🗺️ Inicializando mapa para ${municipio} con coordenadas: ${coords}`);
    
    map = L.map('map').setView(coords, 15);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 19
    }).addTo(map);

    console.log('✅ Mapa inicializado en:', coords);
  }

  // ========================================
  // INICIAR UBICACIÓN EN TIEMPO REAL
  // ========================================
  function startTracking() {
    if (!navigator.geolocation) {
      console.error('❌ Tu navegador no soporta geolocalización');
      alert('Tu navegador no soporta geolocalización');
      return;
    }

    console.log('📍 Iniciando geolocalización continua con watchPosition()...');
    console.log('⏳ Esperando permiso del usuario...');
    
    ubicacionInterval = navigator.geolocation.watchPosition(
      (position) => {
        const { latitude, longitude, accuracy, speed = 0 } = position.coords;

        console.log(`✅ GPS ACTIVO: ${latitude.toFixed(5)}, ${longitude.toFixed(5)}`);

        // Actualizar UI
        document.getElementById('lat').textContent = latitude.toFixed(4);
        document.getElementById('lng').textContent = longitude.toFixed(4);
        document.getElementById('speed').textContent = Math.round(speed * 3.6); // m/s a km/h

        // Actualizar en Firestore
        const coleccion = `patrullas_${municipio}`;
        db.collection(coleccion).doc(patrullaId).update({
          lat: latitude,
          lng: longitude,
          accuracy: accuracy,
          speed: speed,
          online: true,
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).catch((error) => {
          console.warn('⚠️ Error actualizando ubicación en Firestore:', error);
        });

        // Actualizar marker en mapa
        if (myMarker) {
          myMarker.setLatLng([latitude, longitude]);
        } else {
          // Extraer número de patrulla (PATRULLA_01 → 01)
          const numPatrulla = patrullaId.replace('PATRULLA_', '');
          
          // Crear icono personalizado mejorado
          const icon = L.divIcon({
            html: `
              <div style="
                width: 50px;
                height: 50px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border: 3px solid white;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-weight: bold;
                font-size: 20px;
                font-family: Arial, sans-serif;
                box-shadow: 0 3px 10px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.3);
              ">
                ${numPatrulla}
              </div>
            `,
            iconSize: [50, 50],
            iconAnchor: [25, 25],
            popupAnchor: [0, -25],
            className: 'my-patrol-marker'
          });

          myMarker = L.marker([latitude, longitude], {
            icon: icon,
            title: patrullaId
          }).addTo(map);
          console.log(`✅ Marcador 🚔 creado en mapa: ${patrullaId}`);
        }

        map.setView([latitude, longitude], 15);
      },
      (error) => {
        console.error('❌ ERROR DE GEOLOCALIZACIÓN:', error.message);
        console.error('Código:', error.code); // 1=Rechazado, 2=No disponible, 3=Timeout
        
        let mensajeError = '';
        if (error.code === 1) {
          mensajeError = 'Permiso rechazado. Ve a Configuración del navegador y permite acceso a tu ubicación.';
        } else if (error.code === 2) {
          mensajeError = 'Ubicación no disponible. Verifica que tu GPS está activado.';
        } else if (error.code === 3) {
          mensajeError = 'Timeout. Intenta nuevamente.';
        }
        
        alert(`⚠️ ${mensajeError}`);
        
        // Mostrar botón nuevamente para reintentar
        const btn = document.getElementById('btn-start-tracking');
        if (btn) {
          btn.style.display = 'block';
          btn.disabled = false;
          btn.textContent = '📍 Reintentar Rastreo';
        }
      },
      {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 10000
      }
    );

    console.log('✅ watchPosition() iniciado');
  }

  // ========================================
  // ESCUCHAR MENSAJES
  // ========================================
  function listenToMessages() {
    const coleccion = `chat_${municipio}`;

    // Escuchar TODOS los mensajes (sin filtros para evitar composite index)
    db.collection(coleccion)
      .orderBy('timestamp', 'desc')
      .onSnapshot((snapshot) => {
        renderMessages();
      }, (error) => {
        console.warn('⚠️ Error escuchando mensajes:', error);
      });

    console.log('✅ Escuchando mensajes');
  }

  // ========================================
  // RENDERIZAR MENSAJES
  // ========================================
  async function renderMessages() {
    const container = document.getElementById('messages-container');
    const coleccion = `chat_${municipio}`;

    try {
      // Obtener TODOS los mensajes sin filtros
      const snapshot = await db.collection(coleccion)
        .orderBy('timestamp', 'asc')
        .get();

      let allMessages = [];

      snapshot.forEach((doc) => {
        const data = doc.data();
        const msg = {
          id: doc.id,
          ...data,
          timestamp: data.timestamp?.toDate(),
        };

        // Filtrar: mensajes dirigidos a esta patrulla, broadcasts, O mensajes que ENVIE esta patrulla
        const isForMe = data.to === patrullaId;
        const isBroadcast = data.type === 'broadcast';
        const isFromMe = data.from === patrullaId;

        if (isForMe || isBroadcast || isFromMe) {
          allMessages.push(msg);
        }
      });

      // Ordenar por timestamp
      allMessages.sort((a, b) => a.timestamp - b.timestamp);

      if (allMessages.length === 0) {
        container.innerHTML = '<div class="empty-messages">Sin mensajes</div>';
        return;
      }

      container.innerHTML = '';

      allMessages.forEach((msg) => {
        const isOutgoing = msg.from === patrullaId;
        const isBroadcast = msg.type === 'broadcast';

        const div = document.createElement('div');
        div.className = `message ${isBroadcast ? 'broadcast' : (isOutgoing ? 'outgoing' : 'incoming')}`;

        const timeStr = msg.timestamp
          ? msg.timestamp.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })
          : '--:--';

        let fromText = msg.from === 'CENTRO_CONTROL' ? '🎛️ Centro' : msg.from;
        if (isBroadcast) {
          fromText = '📢 BROADCAST';
        }

        div.innerHTML = `
          <div class="message-content">${msg.text}</div>
          <div class="message-meta">${fromText} · ${timeStr}</div>
        `;

        container.appendChild(div);
      });

      // Auto-scroll a último
      container.scrollTop = container.scrollHeight;
    } catch (error) {
      console.error('Error renderizando mensajes:', error);
    }
  }

  // ========================================
  // ENVIAR MENSAJE
  // ========================================
  async function enviarMensaje() {
    const input = document.getElementById('message-input');
    const texto = input.value.trim();

    if (!texto) return;

    try {
      const coleccion = `chat_${municipio}`;

      await db.collection(coleccion).add({
        from: patrullaId,
        to: 'CENTRO_CONTROL',
        text: texto,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        read: false
      });

      console.log('✅ Mensaje enviado');
      input.value = '';
      renderMessages();
    } catch (error) {
      console.error('❌ Error:', error);
    }
  }

  // ========================================
  // TOGGLE EMERGENCIA
  // ========================================
  async function toggleEmergencia() {
    try {
      const coleccion = `patrullas_${municipio}`;
      emergencia = !emergencia;

      await db.collection(coleccion).doc(patrullaId).update({
        emergencia: emergencia,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });

      updateStatus();
      console.log(`${emergencia ? '🚨' : '✅'} Estado actualizado`);
    } catch (error) {
      console.error('Error:', error);
    }
  }

  // ========================================
  // ACTUALIZAR STATUS
  // ========================================
  async function updateStatus() {
    try {
      const coleccion = `patrullas_${municipio}`;
      const doc = await db.collection(coleccion).doc(patrullaId).get();

      if (doc.exists) {
        const data = doc.data();
        emergencia = data.emergencia || false;

        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');

        if (emergencia) {
          dot.classList.add('emergencia');
          text.textContent = '🚨 EMERGENCIA';
        } else {
          dot.classList.remove('emergencia');
          text.textContent = '✅ En línea';
        }
      }
    } catch (error) {
      console.error('Error:', error);
    }
  }

  // ========================================
  // EVENT LISTENERS
  // ========================================
  document.addEventListener('DOMContentLoaded', async () => {
    console.log('📱 DOMContentLoaded disparado');
    
    // Asignar listeners de botones del control bar (siempre disponibles)
    const btnClearMessages = document.getElementById('btn-clear-messages');
    if (btnClearMessages) {
      btnClearMessages.addEventListener('click', async () => {
        if (confirm('¿Limpiar TODO el chat? (Se eliminarán todos los mensajes)')) {
          console.log('🗑️ Limpiando chat de Firestore...');
          
          try {
            const coleccion = `chat_${municipio}`;
            
            // Obtener todos los mensajes
            const snapshot = await db.collection(coleccion).get();
            
            // Crear batch para eliminar en bloque
            const batch = db.batch();
            let conteo = 0;
            
            snapshot.forEach((doc) => {
              const data = doc.data();
              // Eliminar mensajes que sean de o para esta patrulla
              const esParaEsta = (data.to === patrullaId || data.from === patrullaId);
              const esBroadcast = data.type === 'broadcast';
              
              if (esParaEsta || esBroadcast) {
                batch.delete(doc.ref);
                conteo++;
              }
            });
            
            // Ejecutar eliminación en batch
            await batch.commit();
            console.log(`✅ ${conteo} mensajes eliminados de Firestore`);
            
            // Limpiar UI
            document.getElementById('messages-container').innerHTML = 
              '<div class="empty-messages">Chat limpiado</div>';
            
            alert(`✅ ${conteo} mensajes eliminados`);
          } catch (error) {
            console.error('❌ Error limpiando chat:', error);
            alert('Error al limpiar el chat');
          }
        }
      });
      console.log('✅ Listener asignado a btn-clear-messages');
    }
    
    // Intentar cargar patrulla del localStorage
    const hasPatrulla = loadPatrollaFromStorage();

    if (hasPatrulla && patrullaId) {
      // Patrulla ya guardada - inicializar directamente
      console.log(`✅ Iniciando con patrulla guardada: ${patrullaId}`);
      document.getElementById('patrulla-id').textContent = `📱 ${patrullaId}`;
      setTimeout(() => init(), 100);  // Pequeño delay para asegurar que DOM está listo
    } else {
      // No hay patrulla - mostrar modal
      console.log('❌ No hay patrulla guardada, mostrando modal');
      await showSelectPatrullaModal();
      
      // Agregar evento al botón Continuar - MORE ROBUST
      const btnContinue = document.getElementById('btn-continue');
      if (btnContinue) {
        // Remover cualquier listener previo
        const newBtnContinue = btnContinue.cloneNode(true);
        btnContinue.parentNode.replaceChild(newBtnContinue, btnContinue);
        
        // Agregar listener al nuevo botón
        document.getElementById('btn-continue').addEventListener('click', (e) => {
          e.preventDefault();  // Prevenir comportamiento por defecto
          e.stopPropagation(); // Detener propagación
          handleSelectPatrulla();
        });
        console.log('✅ Event listener asignado a btn-continue');
      } else {
        console.error('❌ btn-continue no encontrado');
      }
    }
  });

  function handleSelectPatrulla() {
    console.log('🎯 handleSelectPatrulla() ejecutada');
    
    const select = document.getElementById('patrulla-options');
    if (!select) {
      console.error('❌ Select patrulla-options no encontrado');
      return;
    }
    
    const selected = select.value.trim();

    console.log(`🔍 Valor seleccionado en select: "${selected}"`);

    if (!selected || selected === '') {
      console.warn('⚠️ No hay patrulla seleccionada (valor vacío)');
      alert('Por favor selecciona una patrulla');
      return;
    }

    console.log(`✅ Patrulla válida seleccionada: ${selected}`);

    // 1. Guardar en localStorage
    patrullaId = selected;
    localStorage.setItem('patrullaId', patrullaId);
    console.log(`💾 Patrulla guardada en localStorage: ${patrullaId}`);

    // 2. Actualizar header
    const headerElement = document.getElementById('patrulla-id');
    if (headerElement) {
      headerElement.textContent = `📱 ${patrullaId}`;
      console.log(`📝 Header actualizado: ${patrullaId}`);
    }

    // 3. Cerrar modal - CRITICAL
    const modal = document.getElementById('modal');
    if (modal) {
      modal.classList.remove('active');
      console.log('✅ Modal cerrado (clase active removida)');
    } else {
      console.error('❌ Modal no encontrado');
    }

    // 4. Inicializar app con delay
    console.log('⏳ Waiting 200ms before init()...');
    setTimeout(() => init(), 200);
  }

  function init() {
    if (isInitialized) {
      console.warn('⚠️ App ya inicializada, saltando...');
      return;
    }

    console.log(`🚀 Inicializando app para patrulla: ${patrullaId}`);

    if (!patrullaId) {
      console.error('❌ ERROR: patrullaId está vacío en init()');
      return;
    }

    try {
      initMap();
      listenToMessages();
      updateStatus();

      // NO iniciar tracking automáticamente - esperar a que usuario presione el botón
      // Esto es importante en móvil: muchos navegadores requieren gesto del usuario

      // Agregar event listeners
      document.getElementById('btn-send').addEventListener('click', enviarMensaje);
      document.getElementById('message-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') enviarMensaje();
      });

      document.getElementById('btn-emergencia').addEventListener('click', toggleEmergencia);

      // Botón para iniciar rastreo manualmente
      document.getElementById('btn-start-tracking').addEventListener('click', () => {
        console.log('🟢 Usuario presionó "Iniciar Rastreo"');
        const btn = document.getElementById('btn-start-tracking');
        btn.disabled = true;
        btn.textContent = '⏳ Conectando...';
        startTracking();
        btn.style.display = 'none'; // Ocultar botón después de iniciar
      });

      document.getElementById('btn-select-patrulla').addEventListener('click', () => {
        console.log('🔄 Cambiando patrulla...');
        localStorage.removeItem('patrullaId');
        location.reload();
      });

      // Actualizar status cada 10 segundos
      setInterval(updateStatus, 10000);

      // Renderizar mensajes cada 3 segundos
      setInterval(renderMessages, 3000);

      isInitialized = true;
      console.log('✅ App inicializada correctamente');
    } catch (error) {
      console.error('❌ Error inicializando app:', error);
      alert('Error inicializando: ' + error.message);
    }
  }

  // ========================================
  // LOGOUT
  // ========================================
  function logout() {
    if (confirm('¿Cerrar sesión?')) {
      auth.signOut()
        .then(() => {
          console.log('✅ Logged out');
          window.location.href = '/login.html';
        })
        .catch((err) => {
          console.error('❌ Logout error:', err);
          alert('Error al cerrar sesión: ' + err.message);
        });
    }
  }
</script>
</body>
</html>
