<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TraficoMap - Iniciar Sesión</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .title {
      font-size: 28px;
      color: #333;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 14px;
      color: #999;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 5px;
      font-size: 14px;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .login-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      border-left: 4px solid #c33;
    }

    .error-message.show {
      display: block;
    }

    .demo-users {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid #e0e0e0;
    }

    .demo-title {
      font-size: 12px;
      text-transform: uppercase;
      color: #999;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .demo-user {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .demo-user:hover {
      background: #f0f0f0;
    }

    .demo-label {
      font-weight: 600;
      color: #333;
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 10px;
    }

    .spinner {
      border: 3px solid rgba(102, 126, 234, 0.1);
      border-top-color: #667eea;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .success-message {
      background: #efe;
      color: #3c3;
      padding: 12px 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      border-left: 4px solid #3c3;
    }

    .success-message.show {
      display: block;
    }

    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
      }

      .title {
        font-size: 24px;
      }

      .logo {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🚗</div>
      <h1 class="title">TraficoMap</h1>
      <p class="subtitle">Centro de Control de Tráfico</p>
    </div>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          placeholder="tu@email.com"
          required
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          placeholder="Tu contraseña"
          required
          autocomplete="current-password"
        >
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        Iniciar Sesión
      </button>

      <div class="loading" id="loading">
        <div class="spinner"></div>
      </div>
    </form>

    <div class="demo-users">
      <div class="demo-title">Usuarios de Demostración</div>
      
      <div class="demo-user" onclick="demo('patrulla1@seguridad-mdp.com', 'patrulla123')">
        <span class="demo-label">Patrulla 01:</span> patrulla1@seguridad-mdp.com
      </div>
      
      <div class="demo-user" onclick="demo('patrulla2@seguridad-mdp.com', 'patrulla123')">
        <span class="demo-label">Patrulla 02:</span> patrulla2@seguridad-mdp.com
      </div>
      
      <div class="demo-user" onclick="demo('capa-norte@seguridad-mdp.com', 'control123')">
        <span class="demo-label">Operador (N):</span> capa-norte@seguridad-mdp.com
      </div>
      
      <div class="demo-user" onclick="demo('capa-sur@seguridad-mdp.com', 'control123')">
        <span class="demo-label">Operador (S):</span> capa-sur@seguridad-mdp.com
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

  <!-- Auth Manager -->
  <script src="js/auth-manager.js"></script>

  <script>
    // Load Firebase Config
    let firebaseConfig = null;

    fetch('config.json')
      .then(res => res.json())
      .then(config => {
        firebaseConfig = config.firebase;
        console.log('✅ Firebase config loaded:', firebaseConfig.projectId);
        
        // Initialize Firebase
        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
          console.log('✅ Firebase initialized');
        }
        
        // Initialize auth manager
        AuthManager.init(firebase.auth());
      })
      .catch(err => {
        console.error('❌ Config load error:', err);
        showError('Error al cargar configuración: ' + err.message);
      });

    // Form submission
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        showError('Por favor completa todos los campos');
        return;
      }

      await login(email, password);
    });

    async function login(email, password) {
      const btn = document.getElementById('loginBtn');
      const loading = document.getElementById('loading');
      
      btn.disabled = true;
      loading.style.display = 'block';
      clearMessages();
      
      try {
        const result = await AuthManager.login(email, password);
        
        showSuccess('¡Sesión iniciada! Redirigiendo...');
        
        setTimeout(() => {
          AuthManager.redirectByRole(result.user);
        }, 800);
        
      } catch (error) {
        console.error('Login error:', error);
        
        let message = 'Error al iniciar sesión';
        if (error.code === 'auth/user-not-found') {
          message = 'Usuario no encontrado';
        } else if (error.code === 'auth/wrong-password') {
          message = 'Contraseña incorrecta';
        } else if (error.code === 'auth/invalid-email') {
          message = 'Email inválido';
        } else if (error.code === 'auth/too-many-requests') {
          message = 'Demasiados intentos. Intenta más tarde';
        } else if (error.message) {
          message = error.message;
        }
        
        showError(message);
        btn.disabled = false;
        loading.style.display = 'none';
      }
    }

    function demo(email, password) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = password;
      login(email, password);
    }

    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = message;
      errorDiv.classList.add('show');
    }

    function showSuccess(message) {
      const successDiv = document.getElementById('successMessage');
      successDiv.textContent = message;
      successDiv.classList.add('show');
    }

    function clearMessages() {
      document.getElementById('errorMessage').classList.remove('show');
      document.getElementById('successMessage').classList.remove('show');
    }
  </script>
</body>
</html>
