<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📢 Denuncias - Control</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; color: #1e293b; }
.header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 20px; }
.header .actions { display: flex; gap: 10px; }
.btn { padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-print { background: #10b981; color: white; }
.btn-filter { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); }
.toolbar { padding: 12px 24px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.toolbar select { padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; }
.container { padding: 24px; max-width: 900px; margin: 0 auto; }
.denuncia { background: white; border-radius: 10px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 5px solid #667eea; }
.denuncia-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.cat { display: inline-block; background: #e0e7ff; color: #4338ca; padding: 3px 12px; border-radius: 12px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
.fecha { font-size: 12px; color: #94a3b8; }
.vecino-info { font-size: 13px; color: #475569; margin: 6px 0; }
.texto { margin: 8px 0; font-size: 14px; }
.denuncia img.foto { max-width: 280px; border-radius: 8px; margin: 8px 0; display: block; cursor: pointer; }
.chat-box { margin-top: 12px; border-top: 1px solid #e2e8f0; padding-top: 12px; }
.msg { padding: 7px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 6px; max-width: 80%; }
.msg.mine { background: #10b981; color: white; margin-left: auto; }
.msg.theirs { background: #e2e8f0; color: #1e293b; }
.chat-input-row { display: flex; gap: 6px; margin-top: 8px; }
.chat-input-row input { flex: 1; padding: 8px; border: 1px solid #cbd5e1; border-radius: 8px; }
.chat-input-row button { padding: 8px 16px; border: none; border-radius: 8px; background: #667eea; color: white; cursor: pointer; }
.empty { text-align: center; color: #94a3b8; padding: 40px; }
@media print {
  .header .actions, .toolbar, .chat-box, .chat-input-row { display: none !important; }
  .denuncia { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; }
  body { background: white; }
}
</style>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
<div class="header">
  <h1>📢 Denuncias Vecinales <span id="ciudad-label" style="font-size:14px;opacity:0.8;"></span></h1>
  <div class="actions">
    <button class="btn btn-print" onclick="window.print()">🖨️ Imprimir / PDF</button>
    <button class="btn btn-filter" onclick="logout()">Salir</button>
  </div>
</div>
<div class="toolbar">
  <label style="font-size:13px;font-weight:600;">Filtrar categoría:</label>
  <select id="filtro-categoria" onchange="renderDenuncias()">
    <option value="">Todas</option>
    <option value="luminarias">💡 Luminarias</option>
    <option value="semaforos">🚦 Semáforos</option>
    <option value="baches">🕳️ Baches</option>
    <option value="sospechosos">👤 Sospechosos</option>
    <option value="robos">🔓 Robos</option>
    <option value="choques">💥 Choques</option>
  </select>
  <span id="contador" style="font-size:13px;color:#64748b;"></span>
</div>
<div class="container" id="lista"><div class="empty">Cargando denuncias...</div></div>
<script src="../js/denuncias-control.js?v=1"></script>
</body>
</html>
