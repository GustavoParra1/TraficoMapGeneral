<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TraficoMap - Sistema de Monitoreo Municipal</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  
  <!-- Leaflet MarkerCluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    
    #app-container {
      display: flex;
      height: 100vh;
      width: 100%;
    }
    
    #sidebar {
      width: 300px;
      background: #1a1a2e;
      color: white;
      padding: 20px;
      overflow-y: auto;
      overflow-x: visible;
      box-shadow: 2px 0 8px rgba(0,0,0,0.1);
      position: relative;
      z-index: 10;
    }
    
    #map {
      flex: 1;
      background: #e0e0e0;
    }
    
    #logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .sidebar-section {
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 15px;
      position: relative;
      z-index: 10;
    }
    
    .sidebar-section select {
      position: relative;
      z-index: 1000;
    }
    
    .sidebar-section:last-child {
      border-bottom: none;
    }
    
    .sidebar-title {
      font-size: 14px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 10px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    button {
      padding: 10px 15px;
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }
    
    button:hover {
      background: #0052cc;
    }
    
    button.secondary {
      background: #555;
    }
    
    button.secondary:hover {
      background: #666;
    }
    
    input[type="text"], select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #999;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 8px;
      background: white;
      color: #333;
      position: relative;
      z-index: 100;
    }
    
    select {
      appearance: auto;
      cursor: pointer;
    }
    
    select:focus {
      outline: 2px solid #0066ff;
      outline-offset: 0;
    }
    
    .sidebar-section select {
      position: relative;
      z-index: 1000;
    }
    
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @media (max-width: 768px) {
      #app-container {
        flex-direction: column;
      }
      
      #sidebar {
        width: 100%;
        max-height: 30vh;
      }
      
      #map {
        min-height: 70vh;
      }
    }
  </style>
</head>
<body>

<div id="app-container">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="logo">
      🗺️ TraficoMap
    </div>
    
    <div class="sidebar-section">
      <div class="sidebar-title">Usuario</div>
      <div id="user-email" style="font-size: 12px; margin-bottom: 10px;">
        <span class="loading-spinner"></span> Cargando...
      </div>
      <div class="button-group">
        <button id="logout-btn" data-auth-required style="display:none;">
          <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
        </button>
        <button id="login-btn" class="secondary">
          <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
        </button>
      </div>
    </div>
    
    <div class="sidebar-section">
      <div class="sidebar-title">Mapa Base</div>
      <select id="base-map-selector">
        <option value="osm">OpenStreetMap</option>
        <option value="google-streets">Google Streets</option>
        <option value="google-satellite">Google Satellite</option>
        <option value="google-hybrid">Google Hybrid</option>
      </select>
    </div>
    
    <div class="sidebar-section">
      <div class="sidebar-title">Capas</div>
      <label>
        <input type="checkbox" id="show-zones-checkbox" checked>
        Mostrar Zonas Geográficas
      </label>
      <label style="display:block; margin-top:8px;">
        <input type="checkbox" id="siniestros-checkbox">
        Mostrar Siniestros (<span id="total-siniestros-count">0</span>)
      </label>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">Filtrar Siniestros</div>
      <div style="font-size: 12px;">
        <label style="display: block; margin-bottom: 8px;">
          Año:
          <select id="year-filter" style="width: 100%;"><option value="all">Todos</option></select>
        </label>
        
        <label style="display: block; margin-bottom: 8px;">
          Barrio:
          <select id="barrio-filter" style="width: 100%;"><option value="all">Todos</option></select>
        </label>
        
        <label style="display: block; margin-bottom: 8px;">
          Causa:
          <select id="cause-filter" style="width: 100%;"><option value="all">Todas</option></select>
        </label>
        
        <label style="display: block; margin-bottom: 8px;">
          Participante:
          <select id="participant-filter" style="width: 100%;"><option value="all">Todos</option></select>
        </label>

        <label style="display: block; margin-bottom: 8px;">
          Desde Hora:
          <select id="start-hour-filter" style="width: 100%;"><option value="all">Todas</option></select>
        </label>

        <label style="display: block; margin-bottom: 8px;">
          Hasta Hora:
          <select id="end-hour-filter" style="width: 100%;"><option value="all">Todas</option></select>
        </label>

        <label style="display: block; margin-bottom: 8px;">
          Calle:
          <input type="text" id="street-filter" placeholder="Nombre de la calle...">
        </label>

        <button id="clear-filters-btn" class="secondary" style="width: 100%; margin-top: 8px;">
          Limpiar Filtros
        </button>
      </div>
    </div>
    
    <div class="sidebar-section">
      <div class="sidebar-title">Controles</div>
      <div class="button-group">
        <button id="center-map-btn" class="secondary">
          <i class="fas fa-crosshairs"></i> Centrar Mapa
        </button>
        <button id="reset-view-btn" class="secondary">
          <i class="fas fa-redo"></i> Resetear Vista
        </button>
      </div>
    </div>
    
    <div class="sidebar-section">
      <div class="sidebar-title">Información</div>
      <div id="municipio-info" style="font-size: 12px; line-height: 1.6;"></div>
    </div>
  </div>
  
  <!-- Map -->
  <div id="map"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Leaflet MarkerCluster JS -->
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<!-- Firebase JS (v8 Compat) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- App Scripts -->
<script src="js/geo-layers.js"></script>
<script src="js/siniestros-layer.js"></script>
<script src="js/app.js"></script>

</body>
</html>
