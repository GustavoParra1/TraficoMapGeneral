<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vecino - Denuncias</title>
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="icon" type="image/png" href="icon-512.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Denuncias">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #1e293b; display: flex; flex-direction: column; }
.app-header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.app-header h1 { font-size: 20px; font-weight: 700; }
.btn-logout { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; }
.container { flex: 1; overflow-y: auto; padding: 16px; }
.card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.card h2 { font-size: 16px; margin-bottom: 12px; color: #0f172a; }
label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #475569; }
select, textarea { width: 100%; padding: 10px 12px; border: 1.5px solid #cbd5e1; border-radius: 8px; font-size: 14px; margin-bottom: 14px; background: #f8fafc; }
textarea { min-height: 90px; resize: vertical; }
.btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn-primary { background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%); color: white; }
.btn-secondary { background: #8b5cf6; color: white; margin-bottom: 10px; }
#foto-preview img { max-width: 100%; border-radius: 8px; margin-bottom: 10px; }
.denuncia-item { border-left: 4px solid #0ea5e9; }
.denuncia-cat { display: inline-block; background: #e0f2fe; color: #0369a1; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; margin-bottom: 6px; }
.denuncia-fecha { font-size: 11px; color: #94a3b8; }
.chat-box { margin-top: 10px; border-top: 1px solid #e2e8f0; padding-top: 10px; }
.msg { padding: 6px 10px; border-radius: 8px; font-size: 13px; margin-bottom: 6px; max-width: 85%; }
.msg.mine { background: #0ea5e9; color: white; margin-left: auto; }
.msg.theirs { background: #e0e7ff; color: #1e293b; }
.chat-input-row { display: flex; gap: 6px; margin-top: 8px; }
.chat-input-row input { flex: 1; padding: 8px; border: 1px solid #cbd5e1; border-radius: 8px; margin: 0; }
.chat-input-row button { padding: 8px 14px; border: none; border-radius: 8px; background: #0ea5e9; color: white; cursor: pointer; }
.empty { color: #94a3b8; text-align: center; padding: 20px; font-size: 14px; }
.input-group { position: relative; display: flex; gap: 8px; align-items: flex-end; margin-bottom: 14px; }
.input-group textarea { flex: 1; margin: 0; }
.btn-voice { padding: 10px 12px; background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.3s; display: flex; align-items: center; gap: 6px; }
.btn-voice:hover { transform: scale(1.05); box-shadow: 0 2px 8px rgba(139, 92, 246, 0.3); }
.btn-voice:active { transform: scale(0.98); }
.btn-voice.listening { animation: pulse-voice 1.2s infinite; background: linear-gradient(135deg, #ec4899 0%, #db2777 100%); }
@keyframes pulse-voice { 0%, 100% { box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.6); } 50% { box-shadow: 0 0 0 8px rgba(236, 72, 153, 0); } }
.voice-status { font-size: 12px; color: #64748b; margin-top: 6px; min-height: 18px; }
.debug-panel { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; color: #e2e8f0; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 11px; border-top: 2px solid #475569; z-index: 9999; display: none; }
.debug-panel.show { display: block; }
.debug-log { padding: 4px 8px; border-bottom: 1px solid #334155; }
.debug-log.error { color: #ef4444; }
.debug-log.success { color: #22c55e; }
.debug-log.warning { color: #eab308; }
.debug-log.info { color: #0ea5e9; }
.btn-debug { position: fixed; bottom: 10px; right: 10px; background: #334155; color: white; border: 1px solid #475569; padding: 6px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; z-index: 10000; }
.btn-panico {
  width: 100%;
  padding: 18px;
  border: none;
  border-radius: 12px;
  font-size: 20px;
  font-weight: 800;
  color: #fff;
  background: #dc2626;
  cursor: pointer;
  margin-bottom: 16px;
  box-shadow: 0 4px 14px rgba(220,38,38,0.4);
  animation: pulso 1.6s infinite;
}
.btn-panico:active { transform: scale(0.97); }
@keyframes pulso {
  0%   { box-shadow: 0 0 0 0 rgba(220,38,38,0.5); }
  70%  { box-shadow: 0 0 0 14px rgba(220,38,38,0); }
  100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
}
#loading-overlay {
  position: fixed; inset: 0; background: #0f172a; color: #fff;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; z-index: 99999; transition: opacity 0.3s ease;
}
#loading-overlay .spinner {
  width: 42px; height: 42px; border: 4px solid rgba(255,255,255,0.2);
  border-top-color: #0ea5e9; border-radius: 50%; animation: girar 0.8s linear infinite;
}
#loading-overlay-text { font-size: 14px; color: #cbd5e1; }
@keyframes girar { to { transform: rotate(360deg); } }
.panico-cercano {
  border-left: 5px solid #dc2626;
  background: #fef2f2;
  animation: pulso-tarjeta 1.6s infinite;
}
@keyframes pulso-tarjeta {
  0%, 100% { box-shadow: 0 2px 8px rgba(220,38,38,0.15); }
  50% { box-shadow: 0 2px 16px rgba(220,38,38,0.5); }
}
.banner-instalar {
  background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
  color: white;
  padding: 14px 16px;
  border-radius: 10px;
  margin-bottom: 16px;
  font-size: 13px;
  line-height: 1.5;
  position: relative;
}
.banner-instalar strong { display: block; font-size: 14px; margin-bottom: 4px; }
.banner-instalar .cerrar-banner {
  position: absolute; top: 8px; right: 10px;
  background: rgba(255,255,255,0.2); border: none; color: white;
  width: 22px; height: 22px; border-radius: 50%; cursor: pointer; font-size: 13px; line-height: 1;
}
.banner-instalar code {
  background: rgba(255,255,255,0.2); padding: 1px 6px; border-radius: 4px;
}
</style>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
</head>
<body>
<div id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-overlay-text">Cargando...</div>
</div>
<div class="app-header">
  <h1>📢 Denuncias Vecino</h1>
  <button class="btn-logout" onclick="logout()">Salir</button>
</div>
<div class="container">
  <div id="banner-instalar-container"></div>
  <button class="btn-panico" id="btn-panico" onclick="enviarPanico()">🚨 EMERGENCIA</button>
  <div class="card">
    <h2>🚨 Alertas Cercanas</h2>
    <div id="lista-alertas-cercanas"><div class="empty">Buscando alertas cerca tuyo...</div></div>
  </div>
  <div class="card">
    <h2>Nueva Denuncia</h2>
    <label>Categoría</label>
    <select id="categoria">
      <option value="luminarias">💡 Luminarias</option>
      <option value="semaforos">🚦 Semáforos</option>
      <option value="baches">🕳️ Baches</option>
      <option value="sospechosos">👤 Sospechosos</option>
      <option value="robos">🔓 Robos</option>
      <option value="choques">💥 Choques</option>
    </select>
    <label>Descripción</label>
    <div class="input-group">
      <textarea id="texto" placeholder="Describí la situación..."></textarea>
      <button class="btn-voice" id="btn-voice" title="Grabar descripción con voz">🎤 Voz</button>
    </div>
    <div class="voice-status" id="voice-status"></div>
    <div id="foto-preview"></div>
    <button class="btn btn-secondary" onclick="document.getElementById('file-camara').click()">📷 Tomar foto</button>
    <button class="btn btn-secondary" onclick="document.getElementById('file-foto').click()">🖼️ Adjuntar de galería</button>
    <input type="file" id="file-camara" accept="image/*" capture="environment" style="display:none;">
    <input type="file" id="file-foto" accept="image/*" style="display:none;">
    <button class="btn btn-primary" id="btn-enviar">Enviar Denuncia</button>
  </div>
  <div class="card">
    <h2>Mis Denuncias</h2>
    <div id="lista-denuncias"><div class="empty">Cargando...</div></div>
  </div>
</div>
<div class="debug-panel" id="debug-panel"></div>
<button class="btn-debug" onclick="document.getElementById('debug-panel').classList.toggle('show')">🔧 Debug</button>
<script src="../js/vecino-app.js?v=3"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW no registrado:', e));
  }
</script>
</body>
</html>
