<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billing & Facturas - TraficoMap Admin</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>

<div id="app">
  <nav class="navbar navbar-expand-lg navbar-dark navbar-admin">
    <div class="container-fluid">
      <a class="navbar-brand" href="../index.html">
        <i class="bi bi-speedometer2"></i> Admin Panel
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse ms-auto" id="navbarNav">
        <div class="ms-auto d-flex align-items-center gap-3">
          <button class="btn btn-map-demo btn-sm d-flex align-items-center gap-2" title="Abrir vista previa del mapa en una nueva ventana" onclick="openMapDemo()">
            <i class="bi bi-map"></i> Ver Demo del Mapa
          </button>
          <span class="text-white">|</span>
          <span class="text-white" id="userEmail"></span>
          <button class="btn btn-light btn-sm" id="logoutBtn">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <nav class="col-md-2 sidebar">
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link" href="../index.html#dashboard">
              <i class="bi bi-speedometer2"></i> Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="../index.html#clientes">
              <i class="bi bi-people"></i> Clientes
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="../index.html#subscripciones">
              <i class="bi bi-credit-card"></i> Suscripciones
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="index.html">
              <i class="bi bi-file-earmark-text"></i> Billing
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="../index.html#usuarios">
              <i class="bi bi-shield-lock"></i> Usuarios Admin
            </a>
          </li>
          <hr>
          <li class="nav-item">
            <a class="nav-link" href="../index.html#documentacion" target="_blank">
              <i class="bi bi-book"></i> Documentación
            </a>
          </li>
        </ul>
      </nav>

      <!-- Main Content -->
      <main class="col-md-10 main-content p-4">

        <div id="alertas"></div>

        <div class="row mb-4">
          <div class="col">
            <h3>Facturación</h3>
            <p class="text-muted">Gestiona facturas, pagos e ingresos</p>
          </div>
        </div>

        <!-- Dashboard Cards -->
        <div id="billingDashboard" class="mb-4">
          <div class="spinner-border" role="status">
            <span class="visually-hidden">Cargando...</span>
          </div>
        </div>

        <!-- Filters -->
        <div class="card mb-4">
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-4">
                <label for="searchFacturas" class="form-label">Buscar</label>
                <input
                  type="text"
                  class="form-control"
                  id="searchFacturas"
                  placeholder="Factura, cliente o comprobante..."
                />
              </div>
              <div class="col-md-4">
                <label for="filterEstado" class="form-label">Estado</label>
                <select class="form-select" id="filterEstado">
                  <option value="todos">Todos</option>
                  <option value="pendientes">Pendientes</option>
                  <option value="pagadas">Pagadas</option>
                  <option value="vencidas">Vencidas</option>
                </select>
              </div>
              <div class="col-md-4">
                <label for="filterPeriodo" class="form-label">Período</label>
                <select class="form-select" id="filterPeriodo">
                  <option value="mes_actual">Mes Actual</option>
                  <option value="ultimos_3_meses">Últimos 3 Meses</option>
                  <option value="ultimo_ano">Último Año</option>
                  <option value="todos">Todos</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Facturas Table -->
        <div class="card">
          <div class="card-header bg-light">
            <h5 class="mb-0"><i class="bi bi-receipt"></i> Listado de Facturas</h5>
          </div>
          <div class="card-body">
            <div id="facturasTable">
              <div class="spinner-border" role="status">
                <span class="visually-hidden">Cargando...</span>
              </div>
            </div>
          </div>
        </div>

      </main>
    </div>
  </div>
</div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-analytics-compat.js"></script>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/billing-manager.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        await new Promise((resolve) => {
          const unsubscribe = auth.onAuthStateChanged(async (user) => {
            unsubscribe();
            if (!user) {
              window.location.href = '../index.html';
              return;
            }
            // IMPORTANTE: user.customClaims no existe en el objeto de Firebase
            // Auth (los claims solo se obtienen vía getIdTokenResult()). Antes,
            // por ese error más un problema de paréntesis en la comparación,
            // esta condición nunca bloqueaba a nadie logueado, sin importar el rol.
            const idTokenResult = await user.getIdTokenResult();
            const role = idTokenResult.claims?.role;
            if (role !== 'admin' && role !== 'superadmin') {
              window.location.href = '../index.html';
              return;
            }
            await billingManager.init();
            billingManager.renderDashboard();
            resolve();
          });
        });
      } catch (error) {
        console.error('Error:', error);
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await auth.signOut();
      window.location.href = '../index.html';
    });
  </script>
</body>
</html>
