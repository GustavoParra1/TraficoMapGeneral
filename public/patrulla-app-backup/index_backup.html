<style>

<body>


<!-- HEADER -->
<div class="app-header">
  <h1><span id="patrulla-id">📱 Patrulla</span></h1>
  <div class="status">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Conectando...</span>

</div>

<!-- MAIN CONTAINER -->
<div class="container">
  <!-- MAP -->
  <div class="map-section">
    <div id="map"></div>
    <div class="map-info">
      <div class="coords">
        <div>📍 <span id="lat">-38.00</span>, <span id="lng">-57.55</span></div>
        <div class="speed">⚡ <span id="speed">0</span> km/h</div>
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="btn" id="btn-start-tracking" style="width: auto; background: #10b981;">📍 Iniciar Rastreo</button>
      <button class="btn" id="btn-emergencia" style="width: auto;">🚨 EMERGENCIA</button>
      <button class="btn" id="btn-salir-emergencia" style="width: auto; display:none; background:#991b1b;">🛑 SALIR DE EMERGENCIA</button>

      <div class="empty-messages">Esperando mensajes...</div>
    </div>

<!-- CONTROL BAR -->
<div class="control-bar">
  <button class="btn" id="btn-select-patrulla" style="display:none;">🔄 Cambiar Patrulla</button>
  <button class="btn" id="btn-clear-messages">🗑️ Limpiar Chat</button>
</div>


  <script>
  // ========================================
  // FIREBASE CONFIG - Cargar desde config.json
  // ========================================
  let firebaseConfig = null;
  let db = null;
  let auth = null;

  async function initializeFirebase() {
      // Ya no se fuerza logout automático al cargar la app
    try {
      // Cargar configuración desde config.json
      const response = await fetch('../config.json');
      const config = await response.json();
      firebaseConfig = config.firebase;

      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }

      db = firebase.firestore();
      auth = firebase.auth();

      console.log('✅ Firebase initialized for patrulla-app');


      // Verificar autenticación
      auth.onAuthStateChanged(async (user) => {
        if (!user) {
          // Diagnóstico detallado de cierre
          let reason = 'Firebase Auth: usuario no autenticado (user=null)';
          let lastError = window.__lastAuthError || '';
          let lastToken = '';
          try {
            lastToken = localStorage.getItem('firebaseIdToken') || '';
          } catch(e) {}
          console.warn('🛑', reason, lastError);
          try {
            const logDiv = document.createElement('div');
            logDiv.style = 'background: #dc2626; color: white; padding: 24px; font-size: 20px; position: fixed; top: 0; left: 0; width: 100vw; z-index: 9999;';
            logDiv.innerHTML =
              '<b>🛑 Sesión no válida o expirada</b><br>' +
              '<div style="font-size:16px;margin-top:10px;">Motivo: ' + reason + '</div>' +
              (lastError ? '<div style="font-size:14px;margin-top:8px;">Último error: ' + lastError + '</div>' : '') +
              (lastToken ? '<div style="font-size:12px;margin-top:8px;word-break:break-all;">Token: ' + lastToken + '</div>' : '') +
              '<div style="font-size:14px;margin-top:16px;">Redirigiendo a login.html...</div>';
            document.body.appendChild(logDiv);
          } catch(e) { console.error('No se pudo mostrar mensaje de cierre:', e); }
          setTimeout(() => {
            // NO limpiar el DOM antes de mostrar el mensaje
            localStorage.setItem('postLoginRedirect', window.location.pathname);
            window.location.href = '/login.html';
          }, 2000);
          return;
        }

        console.log('✅ Usuario autenticado:', user.email);


        // Reintentar obtener el custom claim 'city' hasta 5 veces
        let userCity = null;
        let userEmail = user.email || '';
        for (let i = 0; i < 5; i++) {
          const idTokenResult = await user.getIdTokenResult(true); // force refresh
          userCity = idTokenResult.claims.city;
          if (userCity) break;
          console.warn(`⏳ Intento ${i+1}: custom claim 'city' no disponible, reintentando...`);
          await new Promise(res => setTimeout(res, 700));
        }

        if (userCity) {
          municipio = userCity;
          console.log(`📍 Ciudad del usuario: ${municipio}`);
        } else {
          console.warn('⚠️ No se encontró city en custom claims tras varios intentos');
          alert('No se encontró la ciudad asignada a tu usuario. Contacta a soporte.');
          window.location.href = '/login.html';
          return;
        }

        // Si el usuario es patrulla (correo patrulla_XXX@seguridad.com), forzar patrullaId y ocultar selector/modal
        const patrullaMatch = userEmail.match(/^patrulla_([a-zA-Z0-9]+)@seguridad\.com$/);
        if (patrullaMatch) {
          patrullaId = `patrulla_${patrullaMatch[1]}`;
          localStorage.setItem('patrullaId', patrullaId);
          // Ocultar botón Cambiar Patrulla
          setTimeout(() => {
            const btnCambiar = document.getElementById('btn-select-patrulla');
            if (btnCambiar) {
              btnCambiar.style.display = 'none';
            }
            // Ocultar modal si existe
            const modal = document.getElementById('modal');
            if (modal) modal.style.display = 'none';
            // Actualizar header
            const headerElement = document.getElementById('patrulla-id');
            if (headerElement) headerElement.textContent = `📱 ${patrullaId}`;
          }, 500);
        }

        // Iniciar la aplicación DESPUÉS de estar autenticado y tener ciudad
        // Disparar evento personalizado para que DOMContentLoaded sepa que está listo
        window.authReady = true;
        window.dispatchEvent(new Event('authReady'));
      });
    } catch (error) {
      console.error('❌ Firebase initialization error:', error);
      alert('Error al inicializar Firebase. Por favor recarga la página.');
    }
  }

  // Inicializar Firebase al cargar
  initializeFirebase();

  // ========================================
  // VARIABLES GLOBALES
  // ========================================
  let map = null;
  let patrullaId = null;  // Inicializar como null siempre
  let municipio = null;  // Se establece después de autenticación
  let myMarker = null;
  let emergencia = false;
  let ubicacionInterval = null;
  let isInitialized = false;  // Flag para evitar múltiples inicializaciones

  // Coordenadas de cada ciudad
  const CITY_COORDS = {
    'mardelplata': [-38.0, -57.55],
    'cordoba': [-31.4201, -64.1888],
    'san-martin-del-mar': [-38.05, -57.6]
  };

  // ========================================
  // CARGAR PATRULLA GUARDADA
  // ========================================
  function loadPatrollaFromStorage() {
    const stored = localStorage.getItem('patrullaId');
    if (stored) {
      patrullaId = stored;
      console.log(`✅ Patrulla cargada del localStorage: ${patrullaId}`);
      return true;
    }
    return false;
  }

  // ========================================
  // MODAL - SELECCIONAR PATRULLA
  // ========================================
  async function showSelectPatrullaModal() {
    console.log('📋 Mostrando modal de selección de patrulla');
    const modal = document.getElementById('modal');
    const select = document.getElementById('patrulla-options');
    
    modal.classList.add('active');
    document.getElementById('patrulla-id').textContent = '📱 Seleccionar patrulla...';

    // Limpiar opciones previas
    select.innerHTML = '<option value="">-- Cargando patrullas --</option>';

    try {
      // Cargar patrullas UNA SOLA VEZ (no continuo)
      const coleccion = `patrullas_${municipio}`;
      const snapshot = await db.collection(coleccion).get();

      console.log(`📡 Patrullas cargadas: ${snapshot.size}`);

      if (snapshot.empty) {
        select.innerHTML = '<option value="">❌ No hay patrullas disponibles</option>';
        console.warn('⚠️ No hay patrullas en Firestore');
        return;
      }

      select.innerHTML = '<option value="">-- Selecciona tu patrulla --</option>';

      snapshot.forEach((doc) => {
        const option = document.createElement('option');
        option.value = doc.id;
        option.textContent = `🚓 ${doc.id}`;
        select.appendChild(option);
      });

      console.log('✅ Patrullas cargadas en el select');
    } catch (error) {
      console.error('❌ Error cargando patrullas:', error);
      select.innerHTML = '<option value="">❌ Error cargando patrullas</option>';
      alert('Error cargando patrullas: ' + error.message);
    }
  }

  // ========================================
  // INICIALIZAR MAPA
  // ========================================
  function initMap() {
    if (map) {
      console.log('⚠️ Mapa ya inicializado, saltando...');
      return;
    }
    
    // Obtener coordenadas basadas en la ciudad
    const coords = CITY_COORDS[municipio] || [-38.0, -57.55];
    console.log(`🗺️ Inicializando mapa para ${municipio} con coordenadas: ${coords}`);
    
    map = L.map('map').setView(coords, 15);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 19
    }).addTo(map);

    console.log('✅ Mapa inicializado en:', coords);
  }

  // ========================================
  // INICIAR UBICACIÓN EN TIEMPO REAL
  // ========================================
  function startTracking() {
    if (!navigator.geolocation) {
      console.error('❌ Tu navegador no soporta geolocalización');
      alert('Tu navegador no soporta geolocalización');
      return;
    }

    console.log('📍 Iniciando geolocalización continua con watchPosition()...');
    console.log('⏳ Esperando permiso del usuario...');
    
    ubicacionInterval = navigator.geolocation.watchPosition(
      (position) => {
        const { latitude, longitude, accuracy, speed = 0 } = position.coords;

        console.log(`✅ GPS ACTIVO: ${latitude.toFixed(5)}, ${longitude.toFixed(5)}`);

        // Actualizar UI
        document.getElementById('lat').textContent = latitude.toFixed(4);
        document.getElementById('lng').textContent = longitude.toFixed(4);
        document.getElementById('speed').textContent = Math.round(speed * 3.6); // m/s a km/h

        // Actualizar en Firestore
        const coleccion = `patrullas_${municipio}`;
        db.collection(coleccion).doc(patrullaId).update({
          lat: latitude,
          lng: longitude,
          accuracy: accuracy,
          speed: speed,
          online: true,
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).catch((error) => {
          console.warn('⚠️ Error actualizando ubicación en Firestore:', error);
        });

        // Actualizar marker en mapa
        if (myMarker) {
          myMarker.setLatLng([latitude, longitude]);
        } else {
          // Extraer número de patrulla (PATRULLA_01 → 01)
          const numPatrulla = patrullaId.replace('PATRULLA_', '');
          
          // Crear icono personalizado mejorado
          const icon = L.divIcon({
            html: `
              <div style="
                width: 50px;
                height: 50px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border: 3px solid white;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-weight: bold;
                font-size: 20px;
                font-family: Arial, sans-serif;
                box-shadow: 0 3px 10px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.3);
              ">
                ${numPatrulla}
              </div>
            `,
            iconSize: [50, 50],
            iconAnchor: [25, 25],
            popupAnchor: [0, -25],
            className: 'my-patrol-marker'
          });

          myMarker = L.marker([latitude, longitude], {
            icon: icon,
            title: patrullaId
          }).addTo(map);
          console.log(`✅ Marcador 🚔 creado en mapa: ${patrullaId}`);
        }

        map.setView([latitude, longitude], 15);
      },
      (error) => {
        console.error('❌ ERROR DE GEOLOCALIZACIÓN:', error.message);
        console.error('Código:', error.code); // 1=Rechazado, 2=No disponible, 3=Timeout
        
        let mensajeError = '';
        if (error.code === 1) {
          mensajeError = 'Permiso rechazado. Ve a Configuración del navegador y permite acceso a tu ubicación.';
        } else if (error.code === 2) {
          mensajeError = 'Ubicación no disponible. Verifica que tu GPS está activado.';
        } else if (error.code === 3) {
          mensajeError = 'Timeout. Intenta nuevamente.';
        }
        
        alert(`⚠️ ${mensajeError}`);
        
        // Mostrar botón nuevamente para reintentar
        const btn = document.getElementById('btn-start-tracking');
        if (btn) {
          btn.style.display = 'block';
          btn.disabled = false;
          btn.textContent = '📍 Reintentar Rastreo';
        }
      },
      {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 10000
      }
    );

    console.log('✅ watchPosition() iniciado');
  }

  // ========================================
  // ESCUCHAR MENSAJES
  // ========================================
  function listenToMessages() {
    const coleccion = `chat_${municipio}`;

    // Escuchar TODOS los mensajes (sin filtros para evitar composite index)
    db.collection(coleccion)
      .orderBy('timestamp', 'desc')
      .onSnapshot((snapshot) => {
        renderMessages();
      }, (error) => {
        console.warn('⚠️ Error escuchando mensajes:', error);
      });

    console.log('✅ Escuchando mensajes');
  }

  // ========================================
  // RENDERIZAR MENSAJES
  // ========================================
  async function renderMessages() {
    const container = document.getElementById('messages-container');
    const coleccion = `chat_${municipio}`;
    console.log('[DEBUG] renderMessages patrulla', {coleccion, patrullaId, municipio});
    try {
      // Obtener TODOS los mensajes sin filtros
      const snapshot = await db.collection(coleccion)
        .orderBy('timestamp', 'asc')
        .get();

      let allMessages = [];
      let allRawMessages = [];

      const patrullaIdNorm = (patrullaId || '').toUpperCase();
      snapshot.forEach((doc) => {
        const data = doc.data();
        const msg = {
          id: doc.id,
          ...data,
          timestamp: data.timestamp?.toDate(),
        };
        allRawMessages.push(msg); // Guardar todos los mensajes crudos
        // Normalizar destinatario/remitente para comparar sin case sensitive
        const fromNorm = (data.from || '').toUpperCase();
        const toNorm = (data.to || '').toUpperCase();
        const isBroadcast = data.type === 'broadcast';
        // SOLO mostrar en el chat principal:
        // 1. Mensajes enviados por la patrulla
        // 2. Mensajes enviados por CENTRO_CONTROL a la patrulla
        // 3. Mensajes broadcast
        const isFromPatrulla = fromNorm === patrullaIdNorm;
        const isCentroToPatrulla = fromNorm === 'CENTRO_CONTROL' && toNorm === patrullaIdNorm;
        if (isFromPatrulla || isCentroToPatrulla || isBroadcast) {
          allMessages.push(msg);
        }
      });

      // Eliminar recuadro de debug visual de mensajes RAW para producción
      const debugDivId = 'debug-messages-raw';
      const debugDiv = document.getElementById(debugDivId);
      if (debugDiv) debugDiv.remove();

      // Ordenar por timestamp
      allMessages.sort((a, b) => a.timestamp - b.timestamp);

      if (allMessages.length === 0) {
        container.innerHTML = '<div class="empty-messages">Sin mensajes</div>';
        return;
      }

      container.innerHTML = '';

      allMessages.forEach((msg) => {
        const isOutgoing = msg.from === patrullaId;
        const isBroadcast = msg.type === 'broadcast';

        const div = document.createElement('div');
        div.className = `message ${isBroadcast ? 'broadcast' : (isOutgoing ? 'outgoing' : 'incoming')}`;

        const timeStr = msg.timestamp
          ? msg.timestamp.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })
          : '--:--';

        let fromText = msg.from === 'CENTRO_CONTROL' ? '🎛️ Centro' : msg.from;
        if (isBroadcast) {
          fromText = '📢 BROADCAST';
        }

        div.innerHTML = `
          <div class="message-content">${msg.text}</div>
          <div class="message-meta">${fromText} · ${timeStr}</div>
        `;

        container.appendChild(div);
      });

      // Auto-scroll a último
      container.scrollTop = container.scrollHeight;
    } catch (error) {
      console.error('Error renderizando mensajes:', error);
    }
  }

  // ========================================
  // ENVIAR MENSAJE
  // ========================================
  async function enviarMensaje() {
    const input = document.getElementById('message-input');
    const texto = input.value.trim();

    if (!texto) return;

    try {
      const coleccion = `chat_${municipio}`;
      console.log('[DEBUG] enviarMensaje patrulla', {coleccion, patrullaId, municipio, texto});
      await db.collection(coleccion).add({
        from: patrullaId,
        to: 'CENTRO_CONTROL',
        text: texto,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        read: false
      });
      console.log('✅ Mensaje enviado');
      input.value = '';
      renderMessages();
    } catch (error) {
      console.error('❌ Error:', error);
    }
  }

  // ========================================
  // TOGGLE EMERGENCIA
  // ========================================
  async function toggleEmergencia() {
    try {
      const coleccion = `patrullas_${municipio}`;
      emergencia = !emergencia;

      const patrullaRef = db.collection(coleccion).doc(patrullaId);
      const docSnap = await patrullaRef.get();
      if (!docSnap.exists) {
        // Crear documento con datos mínimos
        await patrullaRef.set({
          emergencia: emergencia,
          online: true,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        console.log('🆕 Documento de patrulla creado:', patrullaId);
      } else {
        await patrullaRef.update({
          emergencia: emergencia,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }

      updateStatus();
      console.log(`${emergencia ? '🚨' : '✅'} Estado actualizado`);
    } catch (error) {
      console.error('Error:', error);
      alert('Error al activar emergencia: ' + (error.message || error));
    }
  }

  // ========================================
  // ACTUALIZAR STATUS
  // ========================================
  async function updateStatus() {
    try {
      const coleccion = `patrullas_${municipio}`;
      const doc = await db.collection(coleccion).doc(patrullaId).get();

      if (doc.exists) {
        const data = doc.data();
        emergencia = data.emergencia || false;

        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        const btnEmergencia = document.getElementById('btn-emergencia');
        const btnSalirEmergencia = document.getElementById('btn-salir-emergencia');

        // Cambiar color del marcador en el mapa
        if (window.myMarker) {
          const numPatrulla = (patrullaId || '').replace('PATRULLA_', '');
          let markerColor = emergencia ? '#dc2626' : 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
          let borderColor = emergencia ? '#991b1b' : 'white';
          window.myMarker.setIcon(L.divIcon({
            html: `<div style="width: 50px; height: 50px; background: ${markerColor}; border: 3px solid ${borderColor}; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px; font-family: Arial, sans-serif; box-shadow: 0 3px 10px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.3);">${numPatrulla}</div>` ,
            iconSize: [50, 50],
            iconAnchor: [25, 25],
            popupAnchor: [0, -25],
            className: 'my-patrol-marker'
          }));
        }

        if (emergencia) {
          dot.classList.add('emergencia');
          text.textContent = '🚨 EMERGENCIA';
          if (btnEmergencia) btnEmergencia.classList.add('emergencia-activa');
          if (btnSalirEmergencia) btnSalirEmergencia.style.display = 'flex';
        } else {
          dot.classList.remove('emergencia');
          text.textContent = '✅ En línea';
          if (btnEmergencia) btnEmergencia.classList.remove('emergencia-activa');
          if (btnSalirEmergencia) btnSalirEmergencia.style.display = 'none';
        }
      }
    } catch (error) {
      console.error('Error:', error);
    }
  }

  // ========================================
  // EVENT LISTENERS
  // ========================================
  document.addEventListener('DOMContentLoaded', async () => {
      console.log('📱 DOMContentLoaded disparado', window.__DOMContentLoadedCount);
      if (!window.__DOMContentLoadedCount) window.__DOMContentLoadedCount = 1; else window.__DOMContentLoadedCount++;
      console.log('🟠 DOMContentLoaded count:', window.__DOMContentLoadedCount);

      // Log para detectar doble inicialización
      if (window.isInitialized) {
        console.warn('⚠️ DOMContentLoaded: App ya estaba inicializada (isInitialized=true)');
      }
      // ESPERAR a que la autenticación esté lista
      if (!window.authReady) {
        console.log('⏳ Esperando a que la autenticación esté lista...');
        await new Promise(resolve => window.addEventListener('authReady', resolve, { once: true }));
        console.log('✅ Autenticación lista, continuando...');
      }

      // Asignar listeners de botones del control bar (siempre disponibles)
      const btnClearMessages = document.getElementById('btn-clear-messages');
      if (btnClearMessages) {
        btnClearMessages.addEventListener('click', async () => {
        if (confirm('¿Limpiar TODO el chat? (Se eliminarán todos los mensajes)')) {
          console.log('🗑️ Limpiando chat de Firestore...');
          
          try {
            const coleccion = `chat_${municipio}`;
            
            // Obtener todos los mensajes
            const snapshot = await db.collection(coleccion).get();
            
            // Crear batch para eliminar en bloque
            const batch = db.batch();
            let conteo = 0;
            
            snapshot.forEach((doc) => {
              const data = doc.data();
              // Eliminar mensajes que sean de o para esta patrulla
              const esParaEsta = (data.to === patrullaId || data.from === patrullaId);
              const esBroadcast = data.type === 'broadcast';
              
              if (esParaEsta || esBroadcast) {
                batch.delete(doc.ref);
                conteo++;
              }
            });
            
            // Ejecutar eliminación en batch
            await batch.commit();
            console.log(`✅ ${conteo} mensajes eliminados de Firestore`);
            
            // Limpiar UI
            document.getElementById('messages-container').innerHTML = 
              '<div class="empty-messages">Chat limpiado</div>';
            
            alert(`✅ ${conteo} mensajes eliminados`);
          } catch (error) {
            console.error('❌ Error limpiando chat:', error);
            alert('Error al limpiar el chat');
          }
        }
      });
      console.log('✅ Listener asignado a btn-clear-messages');
    }
    
    // Intentar cargar patrulla del localStorage
    const hasPatrulla = loadPatrollaFromStorage();
    // Si es patrulla, nunca mostrar modal ni selector
    const userEmail = auth && auth.currentUser ? auth.currentUser.email : '';
    const isPatrulla = userEmail && /^patrulla_([a-zA-Z0-9]+)@seguridad\.com$/.test(userEmail);

    if (hasPatrulla && patrullaId) {
      // Patrulla ya guardada - inicializar directamente
      console.log(`✅ Iniciando con patrulla guardada: ${patrullaId}`);
      document.getElementById('patrulla-id').textContent = `📱 ${patrullaId}`;
      setTimeout(() => init(), 100);  // Pequeño delay para asegurar que DOM está listo
    } else if (!isPatrulla) {
      // Solo para usuarios NO patrulla: mostrar modal
      console.log('❌ No hay patrulla guardada, mostrando modal');
      await showSelectPatrullaModal();
      // Agregar evento al botón Continuar - MORE ROBUST
      const btnContinue = document.getElementById('btn-continue');
      if (btnContinue) {
        // Remover cualquier listener previo
        const newBtnContinue = btnContinue.cloneNode(true);
        btnContinue.parentNode.replaceChild(newBtnContinue, btnContinue);
        // Agregar listener al nuevo botón
        document.getElementById('btn-continue').addEventListener('click', (e) => {
          e.preventDefault();  // Prevenir comportamiento por defecto
          e.stopPropagation(); // Detener propagación
          handleSelectPatrulla();
        });
        console.log('✅ Event listener asignado a btn-continue');
      } else {
        console.error('❌ btn-continue no encontrado');
      }
    }
  });

  function handleSelectPatrulla() {
    console.log('🎯 handleSelectPatrulla() ejecutada');
    
    const select = document.getElementById('patrulla-options');
    if (!select) {
      console.error('❌ Select patrulla-options no encontrado');
      return;
    }
    
    const selected = select.value.trim();

    console.log(`🔍 Valor seleccionado en select: "${selected}"`);

    if (!selected || selected === '') {
      console.warn('⚠️ No hay patrulla seleccionada (valor vacío)');
      alert('Por favor selecciona una patrulla');
      return;
    }

    console.log(`✅ Patrulla válida seleccionada: ${selected}`);

    // 1. Guardar en localStorage
    patrullaId = selected;
    localStorage.setItem('patrullaId', patrullaId);
    console.log(`💾 Patrulla guardada en localStorage: ${patrullaId}`);

    // 2. Actualizar header
    const headerElement = document.getElementById('patrulla-id');
    if (headerElement) {
      headerElement.textContent = `📱 ${patrullaId}`;
      console.log(`📝 Header actualizado: ${patrullaId}`);
    }

    // 3. Cerrar modal - CRITICAL
    const modal = document.getElementById('modal');
    if (modal) {
      modal.classList.remove('active');
      console.log('✅ Modal cerrado (clase active removida)');
    } else {
      console.error('❌ Modal no encontrado');
    }

    // 4. Inicializar app con delay
    console.log('⏳ Waiting 200ms before init()...');
    setTimeout(() => init(), 200);
  }

  function init() {

    if (isInitialized) {
      console.warn('⚠️ init(): App ya inicializada, saltando...');
      return;
    }

    console.log(`🚀 Inicializando app para patrulla: ${patrullaId}`);


    if (!patrullaId) {
      console.error('❌ ERROR: patrullaId está vacío en init()');
      return;
    }


    try {
      console.log('🟢 Llamando initMap()');
      initMap();
      console.log('🟢 Llamando listenToMessages()');
      listenToMessages();
      console.log('🟢 Llamando updateStatus()');
      updateStatus();

      // NO iniciar tracking automáticamente - esperar a que usuario presione el botón
      // Esto es importante en móvil: muchos navegadores requieren gesto del usuario

      // Agregar event listeners

      document.getElementById('btn-send').addEventListener('click', () => {
        console.log('🟢 btn-send CLICK');
        enviarMensaje();
      });
      document.getElementById('message-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          console.log('🟢 message-input ENTER');
          enviarMensaje();
        }
      });

      document.getElementById('btn-emergencia').addEventListener('click', () => {
        console.log('🟢 btn-emergencia CLICK');
        toggleEmergencia();
      });
      document.getElementById('btn-salir-emergencia').addEventListener('click', () => {
        console.log('🟢 btn-salir-emergencia CLICK');
        if (emergencia) toggleEmergencia();
      });

      // Botón para iniciar rastreo manualmente
      document.getElementById('btn-start-tracking').addEventListener('click', () => {
        console.log('🟢 Usuario presionó "Iniciar Rastreo"');
        const btn = document.getElementById('btn-start-tracking');
        btn.disabled = true;
        btn.textContent = '⏳ Conectando...';
        startTracking();
        btn.style.display = 'none'; // Ocultar botón después de iniciar
      });

      document.getElementById('btn-select-patrulla').addEventListener('click', () => {
        console.log('🔄 Cambiando patrulla...');
        localStorage.removeItem('patrullaId');
        location.reload();
      });


      // Actualizar status cada 10 segundos
      setInterval(() => {
        console.log('⏰ Interval updateStatus');
        updateStatus();
      }, 10000);
      // Eliminado el setInterval de renderMessages (solo onSnapshot actualiza el chat)

      isInitialized = true;
      window.isInitialized = true;
      console.log('✅ App inicializada correctamente');
    } catch (error) {
      console.error('❌ Error inicializando app:', error);
      alert('Error inicializando: ' + error.message);
    }
  }

  // ========================================
  // LOGOUT
  // ========================================
  function logout() {
    if (confirm('¿Cerrar sesión en esta ventana?')) {
      console.log('🚪 Cerrando sesión de patrulla-app');
      window.location.href = '/login.html';
    }
  }
</script>
<script>
// Log global de errores JS para diagnóstico
window.addEventListener('error', function(e) {
  console.error('[GLOBAL ERROR]', e.message, e.error);
  alert('Error crítico: ' + e.message + '\nVer consola para detalles.');
});
window.addEventListener('unhandledrejection', function(e) {
  console.error('[GLOBAL PROMISE REJECTION]', e.reason);
  alert('Error crítico: ' + e.reason);
});
</script>
