<!-- Firebase Config -->
<script>
var firebaseConfig = {
  apiKey: "AIzaSyCkYYx5n-gKaKtTqOv2R1Glz1D_TA_Y5KA",
  authDomain: "trafico-map-general-v2.firebaseapp.com",
  projectId: "trafico-map-general-v2",
  storageBucket: "trafico-map-general-v2.firebasestorage.app",
  messagingSenderId: "540631719751",
  appId: "1:540631719751:web:bd410f1bbee18e9fabb662",
  databaseURL: "https://trafico-map-general-v2-default-rtdb.firebaseio.com"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.firestore();

// ✅ RESTAURAR SESIÓN DEL CLIENTE desde sessionStorage
const savedClienteId = sessionStorage.getItem('clienteId');
const savedClienteData = sessionStorage.getItem('clienteData');
const isClientSessionRestored = savedClienteId && savedClienteData;

// Guardar en window para que otros scripts lo usen
window.restoredClienteId = savedClienteId;
window.restoredClienteData = savedClienteData ? JSON.parse(savedClienteData) : null;

console.log('🔐 Restauración de sesión cliente:', isClientSessionRestored ? 'SÍ' : 'NO');
if (isClientSessionRestored) {
  console.log('✅ Cliente restaurado:', window.restoredClienteData.nombre);
}

// Detectar si estamos en modo cliente
// ✅ IMPORTANTE: Guardar urlParams en window para que app.js pueda acceder
window.urlParams = new URLSearchParams(window.location.search);
const urlParams = window.urlParams;
const clientCityName = urlParams.get('city');
const isClientMode = clientCityName !== null || isClientSessionRestored;

console.log('🔐 Verificación de autenticación - Modo cliente:', isClientMode ? 'SÍ' : 'NO');
if (isClientMode) {
  if (clientCityName) {
    console.log('📍 Ciudad del cliente (URL):', clientCityName);
    document.getElementById('pageTitle').textContent = `TraficoMap - ${clientCityName}`;
  }
  if (isClientSessionRestored) {
    console.log('📍 Ciudad del cliente (sesión):', window.restoredClienteData.nombre);
    document.getElementById('pageTitle').textContent = `TraficoMap - ${window.restoredClienteData.nombre}`;
  }
}

// Require authentication to access main map (excepto en modo cliente o si hay sesión restaurada)
if (!isClientMode && !isClientSessionRestored) {
  auth.onAuthStateChanged((user) => {
    if (!user) {
      console.warn('⚠️ No authenticated user. Redirecting to login...');
      window.location.href = '/login.html';
    }
  });
} else {
  console.log('🔓 Modo cliente o sesión restaurada: Permitiendo acceso sin autenticación');
  // En modo cliente, NO ejecutar onAuthStateChanged - simplemente permite acceso
}
</script>
